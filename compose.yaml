services:
  db:
    image: postgres:18
    ports:
      - "15432:5432"
    environment:
      POSTGRES_USER: graphein
      POSTGRES_PASSWORD: graphein
      POSTGRES_DB: graphein
    volumes:
      - pgdata:/var/lib/postgresql/data

  db-test:
    image: postgres:18
    ports:
      - "15433:5432"
    environment:
      POSTGRES_USER: graphein_test
      POSTGRES_PASSWORD: graphein_test
      POSTGRES_DB: graphein_test

  db-e2e:
    image: postgres:18
    ports:
      - "15434:5432"
    environment:
      POSTGRES_USER: graphein_e2e
      POSTGRES_PASSWORD: graphein_e2e
      POSTGRES_DB: graphein_e2e
    volumes:
      - pgdata-e2e:/var/lib/postgresql/data

  redis:
    image: redis:8
    ports:
      - "16379:6379"

volumes:
  pgdata:
  pgdata-e2e:
