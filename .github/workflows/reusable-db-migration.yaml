name: DB Migration Check

on:
  workflow_call:

permissions:
  contents: read

jobs:
  db-migration:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 5
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: graphein
          POSTGRES_PASSWORD: graphein
          POSTGRES_DB: graphein
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U graphein"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          install_args: bun

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run migrations
        run: bun run db:migrate
        env:
          DATABASE_URL: postgres://graphein:graphein@localhost:5432/graphein
