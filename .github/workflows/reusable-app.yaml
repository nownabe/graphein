name: App Check

on:
  workflow_call:

permissions:
  contents: read

jobs:
  app:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 5
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: graphein_test
          POSTGRES_PASSWORD: graphein_test
          POSTGRES_DB: graphein_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U graphein_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 16379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          install_args: bun

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun x tsc --noEmit

      - name: Test
        run: bun test
        env:
          TEST_REDIS_URL: redis://localhost:16379/1

      - name: Integration test
        run: bun run test:integration
        env:
          TEST_DATABASE_URL: postgres://graphein_test:graphein_test@localhost:5432/graphein_test

      - name: Build CSS
        run: bun run css:build
