name: App Check

on:
  workflow_call:

permissions:
  contents: read

jobs:
  app:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 5
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: graphein_test
          POSTGRES_PASSWORD: graphein_test
          POSTGRES_DB: graphein_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U graphein_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      valkey:
        image: valkey/valkey:8
        ports:
          - 16379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          install_args: bun

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun x tsc --noEmit

      - name: Test
        run: bun test
        env:
          TEST_VALKEY_URL: redis://localhost:16379/1

      - name: Integration test
        run: bun run test:integration
        env:
          TEST_DATABASE_URL: postgres://graphein_test:graphein_test@localhost:5432/graphein_test

      - name: Build CSS
        run: bun run css:build
