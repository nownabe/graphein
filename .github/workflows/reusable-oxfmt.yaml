name: oxfmt Check

on:
  workflow_call:

permissions:
  contents: read

jobs:
  oxfmt:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2
        with:
          install_args: oxfmt

      - name: Run oxfmt --check
        run: oxfmt --check
